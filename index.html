<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate Finance Paris - Suivi des mandats 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#EEF2F5;color:#1A2E38;font-size:14px;min-height:100vh}
:root{--deep:#1C2B33;--border:rgba(28,43,51,.08);--muted:#8A9FAB;--glass:rgba(255,255,255,.62);--glass-border:rgba(255,255,255,.75);--pad:28px;--gap:12px;--radius:14px}

/* ── HEADER ── */
header{background:var(--deep);height:56px;padding:0 var(--pad);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(28,43,51,.18);gap:16px}
.logo-text h1{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-sub{font-size:11px;font-weight:400;color:rgba(255,255,255,.45);margin-top:2px}

/* ── LAYOUT ── */
.main{padding:var(--pad) var(--pad) 56px;max-width:1600px;margin:0 auto}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:var(--gap);margin-bottom:var(--gap)}
.kpi{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;transition:transform .15s,box-shadow .15s}
.kpi.kpi-clickable{cursor:pointer}
.kpi.kpi-clickable:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(28,43,51,.12)}
.kpi-value{font-size:26px;font-weight:700;line-height:1}
.kpi-label{font-size:11px;color:#8A9FAB;line-height:1.4;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.kpi-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px}
.kpi-badge.kpi-badge-clickable{cursor:pointer;transition:all .15s}
.kpi-badge.kpi-badge-clickable:hover{opacity:1;transform:translateY(-1px);box-shadow:0 3px 10px rgba(28,43,51,.15)}
.badge-g{background:#E8F8F0;color:#0B7A52}
.badge-r{background:#FEF2F2;color:#B91C1C}

/* ── CARDS ── */
.card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:20px;margin-bottom:var(--gap)}
.chart-card{background:#fff;border:1px solid rgba(28,43,51,.1);border-radius:var(--radius);padding:20px;margin-bottom:var(--gap)}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--deep);white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}

/* ── CHART ── */
.chart-outer{position:relative;width:100%;height:260px}

/* ── PIPELINE ── */
.pipeline-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--radius);background:rgba(255,255,255,.5);backdrop-filter:blur(16px)}
.stages-grid{display:grid;gap:0;align-items:stretch;min-width:700px}
.stage-col{display:flex;flex-direction:column;border-right:1px solid rgba(28,43,51,.1)}
.stage-col:last-child{border-right:none}
.stage-hdr{padding:9px 8px;display:flex;flex-direction:column;gap:4px;border-bottom:1px solid rgba(255,255,255,.15)}
.stage-hdr-top{display:flex;align-items:center;justify-content:space-between;width:100%;gap:4px}
.stage-hdr-name{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#fff;line-height:1.3;flex:1}
.stage-count-badge{font-size:10px;font-weight:600;color:rgba(255,255,255,.85);background:rgba(255,255,255,.18);padding:1px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.stage-bar{height:1.5px;border-radius:1px;width:100%;background:rgba(255,255,255,.2)}
.stage-body{padding:8px 6px;display:flex;flex-direction:column;gap:5px;flex:1;background:rgba(255,255,255,.45)}
.logo-chip{display:flex;align-items:center;gap:6px;padding:5px 7px;background:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.9);border-radius:7px;cursor:pointer;transition:all .16s}
.logo-chip:hover{background:#fff;border-color:rgba(28,43,51,.15);transform:translateY(-1px);box-shadow:0 4px 12px rgba(28,43,51,.1)}
.chip-logo{width:22px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.chip-logo img{max-width:100%;max-height:100%;object-fit:contain}
.chip-logo .init{font-size:7px;font-weight:700;color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.chip-name{font-size:10px;font-weight:500;color:var(--deep);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-proba{font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0;background:rgba(28,43,51,.06);padding:1px 5px;border-radius:10px}

/* ── MODALES ── */
.mo{position:fixed;inset:0;background:rgba(28,43,51,.42);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:#fff;border-radius:18px;width:100%;padding:24px;position:relative;box-shadow:0 24px 60px rgba(28,43,51,.14);transform:scale(.97) translateY(6px);transition:transform .22s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
.mo.open .md{transform:scale(1) translateY(0)}
.md-x{position:absolute;top:14px;right:14px;background:#F7F9FB;border:1px solid var(--border);color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2;flex-shrink:0}
.month-modal .md{max-width:480px}
.company-modal .md{max-width:460px}
.mo-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(28,43,51,.04);cursor:pointer}
.mo-item:last-child{border-bottom:none}
.mo-item:hover{opacity:.8}
.mo-item-logo{width:32px;height:22px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.mo-item-logo img{max-width:100%;max-height:100%;object-fit:contain}
.mo-item-logo .init{font-size:9px;font-weight:700;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cm-logo{width:48px;height:48px;background:#EEF2F5;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.cm-logo img{max-width:40px;max-height:32px;object-fit:contain}
.cm-logo .init{font-size:15px;font-weight:700}

/* ── REFERENT LEGEND ── */
#referent-legend{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin-bottom:14px}

/* ── LEGEND TOGGLE ROW ── */
.legend-row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;margin-bottom:18px}

/* ── TABLET ── */
@media(max-width:900px){
  :root{--pad:18px;--gap:10px}
  .kpi-row{grid-template-columns:repeat(3,minmax(0,1fr))}
  .chart-outer{height:220px}
  header{height:52px}
}

/* ── MOBILE ── */
@media(max-width:600px){
  :root{--pad:14px;--gap:8px}
  header{height:auto;padding:10px var(--pad);flex-wrap:wrap;gap:8px;position:relative}
  .logo-text h1{font-size:13px}
  .logo-sub{font-size:10px}
  .header-date{align-items:flex-start!important}
  .kpi-row{grid-template-columns:repeat(2,minmax(0,1fr))}
  .kpi-value{font-size:22px}
  .chart-outer{height:190px}
  .md{padding:16px;border-radius:14px}
  .month-modal .md,.company-modal .md{max-width:100%}
  .mo{padding:10px;align-items:flex-end}
  .mo .md{border-radius:18px 18px 0 0;max-height:85vh}
}
</style>
</head>

function buildMonthly(){
  var maxM=new Array(12).fill(0),probaM=new Array(12).fill(0),secM=new Array(12).fill(0);
  var maxBM=Array.from({length:12},function(){return[]}),probaBM=Array.from({length:12},function(){return[]}),secBM=Array.from({length:12},function(){return[]});

      if(!month||!amount)return;
      var i=mToIdx(month);
      arr[i]+=amount;bm[i].push({name:m.name,domain:m.domain,referent:m.referent,amount:amount,revtype:revtype});
    }
    push(m.max_ret_month,maxM,maxBM,m.retainer,'Retainer');
    push(m.max_clos_month,maxM,maxBM,m.success,'Success fee');

    push(m.prob_clos_month,probaM,probaBM,m.success*m.proba_brute,'Success fee');
    push(m.sec_ret_month,secM,secBM,m.retainer,'Retainer');
    push(m.sec_clos_month,secM,secBM,m.success,'Success fee');
  });
  return{maxM:maxM,probaM:probaM,secM:secM,maxByMonth:maxBM,probaByMonth:probaBM,secByMonth:secBM};

var activeRefs=new Set(),mainChartInstance=null;
var activeDs=new Set([0,1,2]);

function updateLegendItems(){

function toggleDs(idx){
  if(!mainChartInstance)return;
  if(activeDs.size===3){activeDs=new Set([idx]);}
  else if(activeDs.has(idx)&&activeDs.size===1){activeDs=new Set([0,1,2]);}
  else{if(activeDs.has(idx)){if(activeDs.size>1)activeDs.delete(idx);}else activeDs.add(idx);}
  for(var i=0;i<3;i++){mainChartInstance.data.datasets[i].hidden=!activeDs.has(i);}
  mainChartInstance.update();
  updateLegendItems();
  renderCumStrip(getFiltered().secM);
  setTimeout(positionCumStrip,20);
}

function getFiltered(){
  var maxM=new Array(12).fill(0),probaM=new Array(12).fill(0),secM=new Array(12).fill(0);
  MANDATS.forEach(function(m){
    if(activeRefs.size>0&&!activeRefs.has(m.referent))return;
    function add(idx,arr,val){if(idx!==null&&idx!==undefined&&val)arr[idx]+=val;}
    // Max = retainer au mois ret + success au mois clos
    add(m.max_ret_month,maxM,m.retainer);
    add(m.max_clos_month,maxM,m.success);
    // Proba = retainer + success*proba
    add(m.prob_ret_month,probaM,m.retainer);
    if(m.proba_brute>0)add(m.prob_clos_month,probaM,Math.round(m.success*m.proba_brute));
    // Sec = rev_sec ventilé : retainer si rev_sec>=retainer, success si proba==1
    if(m.rev_sec>0){
      if(m.sec_ret_month!==null&&m.retainer>0)add(m.sec_ret_month,secM,m.retainer);
      if(m.proba_brute>=1.0&&m.sec_clos_month!==null&&m.success>0)add(m.sec_clos_month,secM,m.success);
    }
  });
  return{maxM:maxM,probaM:probaM,secM:secM};
}

function renderCumStrip(secM){
  var fm=getFiltered();
  // Totaux avec undated flows
  var totalP=activeRefs.size>0?MANDATS.filter(function(m){return activeRefs.has(m.referent);}).reduce(function(s,m){return s+m.rev_proba;},0):totalProba;
  var totalS=activeRefs.size>0?MANDATS.filter(function(m){return activeRefs.has(m.referent);}).reduce(function(s,m){return s+m.rev_sec;},0):totalSec;
  var totalMx=activeRefs.size>0?MANDATS.filter(function(m){return activeRefs.has(m.referent);}).reduce(function(s,m){return s+m.rev_max;},0):totalMax;
  function lastNonZero(arr){for(var i=11;i>=0;i--)if(arr[i]>0)return i;return 11;}
  // Proba
  var probaMonthly=fm.probaM.slice();
  var diffP=totalP-probaMonthly.reduce(function(a,b){return a+b;},0);
  if(diffP>0.5)probaMonthly[lastNonZero(probaMonthly)]+=diffP;
  // Sec
  var secMonthly=secM.slice();
  var diffS=totalS-secMonthly.reduce(function(a,b){return a+b;},0);
  if(diffS>0.5)secMonthly[lastNonZero(secMonthly)]+=diffS;
  // Max
  var maxMonthly=fm.maxM.slice();
  var diffMx=totalMx-maxMonthly.reduce(function(a,b){return a+b;},0);
  if(diffMx>0.5)maxMonthly[lastNonZero(maxMonthly)]+=diffMx;
  // Cumulés
  var cp=[],cs=[],cm=[],rp=0,rs=0,rm=0;
  for(var i=0;i<12;i++){rp+=probaMonthly[i];rs+=secMonthly[i];rm+=maxMonthly[i];cp.push(rp);cs.push(rs);cm.push(rm);}
  window._cumData={cp:cp,cs:cs,cm:cm};}

function positionCumStrip(){
  var chart=mainChartInstance,strip=document.getElementById('cum-strip');
  if(!chart||!strip||!window._cumData||!chart.scales||!chart.scales.x)return;
  var cd=window._cumData;

  // Le canvas et le strip sont dans le même parent chart-card (padding:20px).
  // chart.chartArea.left est en pixels canvas. Le strip a le même padding-left que le canvas.
  // On utilise directement les coordonnées canvas — elles correspondent au strip car même parent, même largeur.
  var caLeft=chart.chartArea.left;
  var caRight=chart.chartArea.right;

  strip.innerHTML='';
  strip.style.position='relative';
  strip.style.height='auto';
  strip.style.paddingTop='4px';

  function buildSection(title,color,values,type){
    var titleEl=document.createElement('div');
    titleEl.style.cssText='font-size:10px;font-weight:700;color:'+color+';margin-bottom:4px;padding-left:'+caLeft+'px';
    titleEl.textContent=title;
    strip.appendChild(titleEl);
    var rowEl=document.createElement('div');
    rowEl.style.cssText='position:relative;height:22px;margin-bottom:10px';
    strip.appendChild(rowEl);

    values.forEach(function(v,i){
      var xPx=chart.scales.x.getPixelForValue(i);
      var pill=document.createElement('div');
      pill.style.cssText='position:absolute;transform:translateX(-50%);top:0;'+(v>0?'cursor:pointer':'pointer-events:none');
      pill.style.left=xPx+'px';
      if(v>0){
        pill.innerHTML='<span style="display:inline-flex;justify-content:center;min-width:44px;background:'+color+'14;border:1px solid '+color+'55;border-radius:20px;padding:1px 7px;font-size:9.5px;font-weight:700;color:'+color+';transition:background .14s">'+fmtK(v)+'</span>';
        (function(monthIdx,cumVal){
          pill.addEventListener('mouseenter',function(){pill.querySelector('span').style.background=color+'30';});
          pill.addEventListener('mouseleave',function(){pill.querySelector('span').style.background=color+'14';});
          pill.addEventListener('click',function(){showCumModal(type,monthIdx,cumVal);});
        })(i,v);
      } else {
        pill.innerHTML='<span style="display:inline-flex;justify-content:center;min-width:44px;background:'+color+'08;border:1px solid '+color+'30;border-radius:20px;padding:1px 7px;font-size:9.5px;font-weight:600;color:'+color+'55">-</span>';
      }
      rowEl.appendChild(pill);
    });

    // Ligne entre les pills (segments, pas derrière)
    var HALF=26;
    for(var si=0;si<values.length;si++){
      var xCur=chart.scales.x.getPixelForValue(si);
      if(si===0){
        if(xCur-HALF>caLeft){
          var s1=document.createElement('div');
          s1.style.cssText='position:absolute;height:1px;background:'+color+'40;top:10px;pointer-events:none;left:'+caLeft+'px;width:'+(xCur-HALF-caLeft)+'px';
          rowEl.appendChild(s1);
        }
      } else {
        var xPrev=chart.scales.x.getPixelForValue(si-1);
        if(xCur-HALF>xPrev+HALF){
          var s2=document.createElement('div');
          s2.style.cssText='position:absolute;height:1px;background:'+color+'40;top:10px;pointer-events:none;left:'+(xPrev+HALF)+'px;width:'+(xCur-HALF-xPrev-HALF)+'px';
          rowEl.appendChild(s2);
        }
      }
      if(si===values.length-1&&xCur+HALF<caRight){
        var s3=document.createElement('div');
        s3.style.cssText='position:absolute;height:1px;background:'+color+'40;top:10px;pointer-events:none;left:'+(xCur+HALF)+'px;width:'+(caRight-xCur-HALF)+'px';
        rowEl.appendChild(s3);
      }
    }
  }
  if(activeDs.has(0))buildSection('Revenu sécurisé cumulé',C_SEC,cd.cs,'sec');
  if(activeDs.has(1))buildSection('Revenu probabilisé cumulé',C_PROBA,cd.cp,'proba');
  if(activeDs.has(2))buildSection('Revenu max cumulé',C_MAX,cd.cm,'max');
}

var topLabelPlugin={id:'topLabel',afterDatasetsDraw:function(chart){

function showCumModal(type,upToIdx,cumVal){
  var cfg={
    max:{label:'Revenu max cumulé',color:C_MAX,retKey:'max_ret_month',closKey:'max_clos_month',amtFn:function(m){return m.rev_max;}},
    proba:{label:'Revenu probabilisé cumulé',color:C_PROBA,retKey:'prob_ret_month',closKey:'prob_clos_month',amtFn:function(m){return m.rev_proba;}},
    sec:{label:'Revenu sécurisé cumulé',color:C_SEC,retKey:'sec_ret_month',closKey:'sec_clos_month',amtFn:function(m){return m.rev_sec;}}
  };
  var c=cfg[type];

  // Collecte les flux jusqu'au mois upToIdx (inclus), triés chronologiquement
  var rows=[];
  MANDATS.forEach(function(m){
    if(activeRefs.size>0&&!activeRefs.has(m.referent))return;
    var retIdx=m[c.retKey]!==null&&m[c.retKey]!==undefined?m[c.retKey]:null;
    var closIdx=m[c.closKey]!==null&&m[c.closKey]!==undefined?m[c.closKey]:null;
    // Retainer : pour sec, seulement si rev_sec > 0
    if(retIdx!==null&&retIdx<=upToIdx&&m.retainer>0){
      if(type!=='sec'||m.rev_sec>0)
        rows.push({name:m.name,domain:m.domain,referent:m.referent,stade:m.stade,monthIdx:retIdx,amount:m.retainer,revtype:'Retainer'});
    }
    // Success fee : pour sec seulement si proba==1
    if(closIdx!==null&&closIdx<=upToIdx&&m.success>0){
      if(type==='sec'&&m.proba_brute>=1.0)
        rows.push({name:m.name,domain:m.domain,referent:m.referent,stade:m.stade,monthIdx:closIdx,amount:m.success,revtype:'Success fee'});
      else if(type==='proba'&&m.proba_brute>0)
        rows.push({name:m.name,domain:m.domain,referent:m.referent,stade:m.stade,monthIdx:closIdx,amount:Math.round(m.success*m.proba_brute),revtype:'Success fee'});
      else if(type==='max')
        rows.push({name:m.name,domain:m.domain,referent:m.referent,stade:m.stade,monthIdx:closIdx,amount:m.success,revtype:'Success fee'});
    }
  });
  // Tri chronologique puis alpha
  rows.sort(function(a,b){return a.monthIdx-b.monthIdx||a.name.localeCompare(b.name,'fr');});

  var h='<div style="display:flex;align-items:center;justify-content:space-between;padding-right:36px;margin-bottom:16px">'+
    '<div style="font-size:18px;font-weight:700;color:'+c.color+'">'+c.label+'</div>'+
    '<span style="font-size:13px;font-weight:700;padding:3px 12px;border-radius:20px;background:'+c.color+'15;color:'+c.color+';border:1px solid '+c.color+'40">'+fmtK(cumVal)+'</span>'+
    '</div>';

  h+='<div style="display:grid;grid-template-columns:1fr 60px 90px 80px;gap:10px;padding:0 0 4px;margin-bottom:0">'+
    '<span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB">Mandat</span>'+
    '<span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB">Référent</span>'+
    '<span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB">Type</span>'+
    '<span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB;text-align:right">Montant</span>'+
    '</div>';

  var lastMonth=-1;
  rows.forEach(function(r){
    var rc=REFERENTS[r.referent]||{color:'#8A9FAB'};
    var ini=r.referent.split(' ').map(function(w){return w[0];}).join('').substring(0,3);
    var fBg=r.revtype==='Retainer'?'#EFF6FF':'#F0FDF4';
    var fCol=r.revtype==='Retainer'?'#1D4ED8':'#15803D';
    var fBd=r.revtype==='Retainer'?'#BFDBFE':'#BBF7D0';
    var safeName=r.name.replace(/\\/g,'\\\\').replace(/"/g,'&quot;');
    var isNewMonth=r.monthIdx!==lastMonth;
    lastMonth=r.monthIdx;

    // Header de groupe mois
    if(isNewMonth){
      h+='<div style="font-size:11px;font-weight:600;color:#1C2B33;padding:'+(lastMonth!==-1?'10px':'4px')+' 0 4px;'+(lastMonth!==-1?'border-top:1px solid rgba(28,43,51,.06);':'')+'">'+MONTHS_FULL[r.monthIdx]+'</div>';
    }

    h+='<div style="display:grid;grid-template-columns:1fr 60px 90px 80px;gap:10px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(28,43,51,.04);cursor:pointer" onclick="document.getElementById(\'mo-cum\').classList.remove(\'open\');showCompanyModal(\''+safeName+'\')">' +
      '<div style="display:flex;align-items:center;gap:7px;min-width:0">'+
        '<div style="width:24px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+logoHTML(r.domain,r.name,22)+'</div>'+
        '<span style="font-size:12px;font-weight:500;color:var(--deep);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.name+'</span>'+
      '</div>'+
      '<div style="display:flex;justify-content:center">'+
        '<span style="width:22px;height:22px;border-radius:50%;background:'+rc.color+';color:#fff;font-size:7px;font-weight:700;display:inline-flex;align-items:center;justify-content:center" title="'+r.referent+'">'+ini+'</span>'+
      '</div>'+
      '<span style="font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;background:'+fBg+';color:'+fCol+';border:1px solid '+fBd+';white-space:nowrap">'+r.revtype+'</span>'+
      '<span style="font-size:12px;font-weight:700;color:'+c.color+';text-align:right;white-space:nowrap">'+fmtK(r.amount)+'</span>'+
      '</div>';
  });

  if(!rows.length)h+='<div style="text-align:center;padding:24px;color:#8A9FAB;font-size:12px">Aucun flux sur cette période</div>';

  document.getElementById('mo-cum-body').innerHTML=h;
  document.getElementById('mo-cum').classList.add('open');
}

function renderPipeline(){
  var sm={};STAGES_ORDER.forEach(function(s){sm[s.k]=[];});
  MANDATS.forEach(function(m){
    if(activeRefs.size>0&&!activeRefs.has(m.referent))return;
    var matched=null;STAGES_ORDER.forEach(function(s){if(m.stade&&!matched&&(m.stade===s.k||m.stade.indexOf(s.k.split('/')[0].trim())>=0||s.k.indexOf(m.stade.split('(')[0].trim())>=0))matched=s.k;});
    if(!matched)STAGES_ORDER.forEach(function(s){if(m.stade&&s.k.indexOf('Préparation')>=0&&m.stade.indexOf('Préparation')>=0)matched='Préparation (IM, BP)';if(m.stade&&s.k.indexOf('Exclusivité')>=0&&m.stade.indexOf('Exclusivité')>=0)matched='Exclusivité / Due Diligence';});
    if(matched&&sm[matched]!==undefined)sm[matched].push(m);
  });
  Object.keys(sm).forEach(function(k){sm[k].sort(function(a,b){return a.name.localeCompare(b.name,'fr');});});
  document.getElementById('stages-grid').style.gridTemplateColumns='repeat('+STAGES_ORDER.length+',minmax(0,1fr))';
  var h='';
  STAGES_ORDER.forEach(function(s){
    var list=sm[s.k]||[];
    h+='<div class="stage-col"><div class="stage-hdr" style="background:'+s.color+'"><div class="stage-hdr-top"><div class="stage-hdr-name">'+s.k+'</div><div class="stage-count-badge">'+list.length+'</div></div><div class="stage-bar"></div></div><div class="stage-body">';
    if(!list.length)h+='<div style="font-size:10px;color:#8A9FAB;text-align:center;padding:12px 4px;opacity:.4;font-style:italic">-</div>';
    else list.forEach(function(m){
      var ref=REFERENTS[m.referent]||{color:'#8A9FAB'};
      h+='<div class="logo-chip" data-mandat="'+m.name.replace(/"/g,'&quot;')+'"><div class="chip-logo">'+logoHTML(m.domain,m.name,22)+'</div><div class="chip-name">'+m.name+'</div><span style="font-size:9px;font-weight:700;background:'+ref.color+'18;color:'+ref.color+';border:1px solid '+ref.color+'40;padding:1px 5px;border-radius:10px;flex-shrink:0">'+Math.round(m.proba_brute*100)+'%</span></div>';
    });
    h+='</div></div>';
  });
  document.getElementById('stages-grid').innerHTML=h;
  document.getElementById('stages-grid').addEventListener('click',function(e){var chip=e.target.closest('.logo-chip');if(chip)showCompanyModal(chip.getAttribute('data-mandat'));});
}

function renderReferentLegend(){
  var el=document.getElementById('referent-legend');
  el.innerHTML='';
  var lbl=document.createElement('span');
  lbl.style.cssText='font-size:12px;font-weight:500;color:#8A9FAB;align-self:center;white-space:nowrap';
  lbl.textContent='Filtrer par référent :';
  el.appendChild(lbl);
  Object.keys(REFERENTS).forEach(function(name){
    var r=REFERENTS[name];
    var dn=REAL_REFERENTS[name]||name;
    var pill=document.createElement('div');
    pill.className='ref-pill';
    pill.setAttribute('data-ref',name);
    pill.style.cssText='display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px 3px 5px;border-radius:20px;cursor:pointer;user-select:none;border:1px solid '+r.color+';color:'+r.color+';background:'+r.color+'14;transition:all .18s';
    // Checkbox carré arrondi
    var ck=document.createElement('span');
    ck.className='pill-check';
    ck.style.cssText='width:13px;height:13px;border-radius:3px;border:1.5px solid '+r.color+';display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;background:transparent';
    // Tick SVG
    var tk=document.createElement('span');
    tk.className='pill-tick';
    tk.style.cssText='opacity:0;transition:opacity .15s;line-height:1;font-size:10px;font-weight:700;color:#fff';
    tk.innerHTML='&#10003;';
    ck.appendChild(tk);
    pill.appendChild(ck);
    var txt=document.createElement('span');
    txt.textContent=dn;
    pill.appendChild(txt);
    (function(n){
      pill.onclick=function(){
        if(activeRefs.has(n))activeRefs.delete(n);else activeRefs.add(n);
        updateChart();
      };
    })(name);
    el.appendChild(pill);
  });
}
