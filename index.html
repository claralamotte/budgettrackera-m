<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate Finance Paris - Suivi des mandats 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#EEF2F5;color:#1A2E38;font-size:14px;min-height:100vh}
:root{
  --deep:#1C2B33;--border:rgba(28,43,51,.08);--muted:#8A9FAB;--bg:#F7F9FB;
  --glass:rgba(255,255,255,.62);--glass-border:rgba(255,255,255,.75);
  --c1:#1C2B33;
  --ref-HT:#185FA5;--ref-MW:#1D9E75;--ref-FM:#D85A30;--ref-PMB:#D4537E;--ref-SC:#7F77DD;--ref-EC:#BA7517;
}
header{background:var(--deep);height:56px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(28,43,51,.18)}
.logo-text h1{color:#fff;font-size:16px;font-weight:600;letter-spacing:-.01em}
.header-r{display:flex;align-items:center;gap:8px}
.hbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);font-family:inherit;font-size:11px;font-weight:500;padding:5px 13px;border-radius:6px;cursor:pointer;transition:all .18s}
.hbtn:hover{background:rgba(255,255,255,.13);color:#fff}

.main{padding:22px 32px 48px}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);height:20px;display:flex;align-items:center}
.kpi-value{font-size:26px;font-weight:700;color:var(--deep);line-height:1;height:36px;display:flex;align-items:center;margin:8px 0 8px}
.kpi-sub{font-size:10px;color:var(--muted)}
.kpi-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:0}
.badge-g{background:#E8F8F0;color:#0B7A52}
.badge-r{background:#FEF2F2;color:#B91C1C}
.badge-a{background:#FFF7ED;color:#92400E}

/* Chart card */
.card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:14px;padding:20px 22px;margin-bottom:18px}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--deep);white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}

.legend-row{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.legend-sq{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.legend-ln{width:18px;height:3px;flex-shrink:0;border-radius:2px}
.legend-ln.dashed{background:repeating-linear-gradient(90deg,#BA7517 0,#BA7517 4px,transparent 4px,transparent 7px)}

.chart-outer{position:relative;width:100%;height:260px}

.referent-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.ref-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.ref-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Pipeline tracker */
.stages-grid{display:grid;gap:0;align-items:stretch}
.stage-col{display:flex;flex-direction:column;border-right:1px solid rgba(28,43,51,.1)}
.stage-col:last-child{border-right:none}
.stage-hdr{padding:10px 10px 9px;display:flex;flex-direction:column;align-items:flex-start;gap:4px;border-bottom:1px solid rgba(255,255,255,.15)}
.stage-hdr-top{display:flex;align-items:center;justify-content:space-between;width:100%;gap:6px}
.stage-hdr-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:#fff;line-height:1.3;flex:1}
.stage-count-badge{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);background:rgba(255,255,255,.18);padding:1px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.stage-bar{height:1.5px;border-radius:1px;width:100%;background:rgba(255,255,255,.2)}
.stage-body{padding:10px 8px;display:flex;flex-direction:column;gap:6px;flex:1;background:rgba(255,255,255,.45)}
.stage-empty{font-size:10px;color:var(--muted);text-align:center;padding:12px 4px;opacity:.4;font-style:italic}

.logo-chip{display:flex;align-items:center;gap:7px;padding:6px 8px;background:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.9);border-radius:8px;cursor:pointer;transition:all .16s}
.logo-chip:hover{background:#fff;border-color:rgba(28,43,51,.15);transform:translateY(-1px);box-shadow:0 4px 14px rgba(28,43,51,.1)}
.chip-logo{width:26px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.chip-logo img{max-width:100%;max-height:100%;object-fit:contain}
.chip-logo .init{font-size:8px;font-weight:700;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.chip-name{font-size:10px;font-weight:500;color:var(--deep);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-proba{font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0;background:rgba(28,43,51,.06);padding:1px 5px;border-radius:10px}
.chip-ref-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* Modals */
.mo{position:fixed;inset:0;background:rgba(28,43,51,.42);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:#fff;border-radius:18px;width:100%;padding:26px;position:relative;box-shadow:0 24px 60px rgba(28,43,51,.14);transform:scale(.97) translateY(6px);transition:transform .22s cubic-bezier(.34,1.56,.64,1);max-height:88vh;overflow-y:auto}
.mo.open .md{transform:scale(1) translateY(0)}
.md-x{position:absolute;top:14px;right:14px;background:#F7F9FB;border:1px solid var(--border);color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s}
.md-x:hover{background:#EEF2F5}

/* Month modal */
.month-modal .md{max-width:480px}
.month-modal .md-title{font-size:18px;font-weight:700;color:var(--deep);margin-bottom:4px;padding-right:36px}
.month-modal .md-sub{font-size:11px;color:var(--muted);margin-bottom:16px}
.mo-totals{display:flex;gap:10px;margin-bottom:16px}
.mo-total{flex:1;background:#F7F9FB;border-radius:10px;padding:10px 12px}
.mo-total-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.mo-total-val{font-size:15px;font-weight:700;color:var(--deep)}
.mo-divider{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:10px 0 6px;border-top:1px solid var(--border);margin-top:10px}
.mo-divider:first-of-type{border-top:none;padding-top:0}

.mo-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(28,43,51,.04)}
.mo-item:last-child{border-bottom:none}
.mo-item-logo{width:36px;height:26px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.mo-item-logo img{max-width:100%;max-height:100%;object-fit:contain}
.mo-item-logo .init{font-size:10px;font-weight:700;color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.mo-item-info{flex:1;min-width:0}
.mo-item-name{font-size:13px;font-weight:500;color:var(--deep)}
.mo-item-type{font-size:10px;color:var(--muted)}
.tag{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;margin-left:auto;flex-shrink:0}
.mo-amount{font-size:12px;font-weight:600;color:var(--deep);white-space:nowrap;flex-shrink:0}

/* Company detail modal */
.company-modal .md{max-width:460px}
.cm-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-right:36px}
.cm-logo{width:52px;height:52px;background:#EEF2F5;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.cm-logo img{max-width:44px;max-height:36px;object-fit:contain}
.cm-logo .init{font-size:16px;font-weight:700}
.cm-name{font-size:20px;font-weight:700;color:var(--deep)}
.cm-type{font-size:11px;color:var(--muted);margin-top:2px}
.cm-referent{font-size:11px;margin-top:3px;display:flex;align-items:center;gap:5px}
.chips-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:5px 11px;border-radius:20px;border:1px solid}
.chip-ok{background:#E8F8F0;color:#0B7A52;border-color:#B6E8D4}
.chip-no{background:#FEF2F2;color:#B91C1C;border-color:#FECACA}
.chip-neutral{background:#F1F5F9;color:#475569;border-color:#E2E8F0}
.chip-warn{background:#FFF7ED;color:#92400E;border-color:#FED7AA}
.cm-section{margin-bottom:14px}
.cm-section-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px}
.cm-proba-breakdown{background:#F7F9FB;border-radius:10px;padding:12px}
.proba-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.proba-row+.proba-row{border-top:1px solid var(--border)}
.proba-row-lbl{color:var(--muted)}
.proba-row-val{font-weight:600;color:var(--deep)}
.proba-total{display:flex;justify-content:space-between;align-items:center;padding:8px 0 0;margin-top:6px;border-top:1.5px solid var(--deep);font-size:13px;font-weight:700;color:var(--deep)}
.cm-fin{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
.cm-fin-item{background:#F7F9FB;border-radius:8px;padding:9px 11px}
.cm-fin-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.cm-fin-val{font-size:14px;font-weight:700;color:var(--deep)}
.cm-dates{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.cm-date-item{background:#F7F9FB;border-radius:8px;padding:8px 10px}
.cm-date-lbl{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.cm-date-val{font-size:12px;font-weight:600;color:var(--deep)}
</style>
</head>

function fmtK(v){
  if(!v||v===0) return '€0';
  if(v>=1000000) return '€'+(v/1000000).toFixed(1)+'m';
  if(v>=1000) return '€'+Math.round(v/1000)+'k';
  return '€'+Math.round(v);
}
function fmtFull(v){
  if(!v||v===0) return '€0';
  if(v>=1000000) return '€'+(v/1000000).toFixed(1)+'m';
  if(v>=1000) return '€'+Math.round(v/1000)+'k';
  return '€'+Math.round(v);
}
function pct(v,total){if(!total)return '0%';return Math.round(v/total*100)+'%'}

// Build monthly arrays
function buildMonthly(){
  var maxM=new Array(12).fill(0), probaM=new Array(12).fill(0), secM=new Array(12).fill(0);
  var maxByMonth=Array.from({length:12},function(){return[]}),
      probaByMonth=Array.from({length:12},function(){return[]}),
      secByMonth=Array.from({length:12},function(){return[]});

  MANDATS.forEach(function(m){
    // MAX
    if(m.max_ret_month&&m.max_ret_month>=1&&m.max_ret_month<=12&&m.retainer>0){
      var mi=m.max_ret_month-1;maxM[mi]+=m.retainer;
      maxByMonth[mi].push({name:m.name,domain:m.domain,referent:m.referent,amount:m.retainer,revtype:'Retainer',proba_brute:m.proba_brute,type_mandat:m.type_mandat});
    }
    if(m.max_clos_month&&m.max_clos_month>=1&&m.max_clos_month<=12&&m.success>0){
      var mi=m.max_clos_month-1;maxM[mi]+=m.success;
      maxByMonth[mi].push({name:m.name,domain:m.domain,referent:m.referent,amount:m.success,revtype:'Success fee',proba_brute:m.proba_brute,type_mandat:m.type_mandat});
    }
    // PROBA
    if(m.prob_ret_month&&m.prob_ret_month>=1&&m.prob_ret_month<=12&&m.retainer>0){
      var mi=m.prob_ret_month-1;probaM[mi]+=m.retainer;
      probaByMonth[mi].push({name:m.name,domain:m.domain,referent:m.referent,amount:m.retainer,revtype:'Retainer',proba_brute:m.proba_brute,type_mandat:m.type_mandat});
    }
    if(m.prob_clos_month&&m.prob_clos_month>=1&&m.prob_clos_month<=12&&m.success>0){
      var mi=m.prob_clos_month-1;var amt=m.success*m.proba_brute;probaM[mi]+=amt;
      probaByMonth[mi].push({name:m.name,domain:m.domain,referent:m.referent,amount:amt,revtype:'Success fee',proba_brute:m.proba_brute,type_mandat:m.type_mandat});
    }
    // SEC
    if(m.sec_ret_month&&m.sec_ret_month>=1&&m.sec_ret_month<=12&&m.retainer>0){
      var mi=m.sec_ret_month-1;secM[mi]+=m.retainer;
      secByMonth[mi].push({name:m.name,domain:m.domain,referent:m.referent,amount:m.retainer,revtype:'Retainer',proba_brute:m.proba_brute,type_mandat:m.type_mandat});
    }
    if(m.sec_clos_month&&m.sec_clos_month>=1&&m.sec_clos_month<=12&&m.success>0){
      var mi=m.sec_clos_month-1;secM[mi]+=m.success;
      secByMonth[mi].push({name:m.name,domain:m.domain,referent:m.referent,amount:m.success,revtype:'Success fee',proba_brute:m.proba_brute,type_mandat:m.type_mandat});
    }
  });
  return{maxM:maxM,probaM:probaM,secM:secM,maxByMonth:maxByMonth,probaByMonth:probaByMonth,secByMonth:secByMonth};
}

function blendHex(h1,h2,t){
  function hv(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
  function th(n){return ('0'+Math.round(n).toString(16)).slice(-2)}
  var a=hv(h1),b=hv(h2);
  return '#'+th(a[0]+(b[0]-a[0])*t)+th(a[1]+(b[1]-a[1])*t)+th(a[2]+(b[2]-a[2])*t);
}

function getCumulativeSec(secM){

}

// Custom datalabels plugin (draw value above each bar group)
var topLabelPlugin = {
  id:'topLabel',
  afterDatasetsDraw:function(chart){
    var ctx=chart.ctx;
    var datasets=chart.data.datasets;
    var metas=[chart.getDatasetMeta(0),chart.getDatasetMeta(1),chart.getDatasetMeta(2)];
    if(!metas[0].data.length) return;
    ctx.save();
    for(var i=0;i<12;i++){
      metas.forEach(function(meta,bi){
        var bar=meta.data[i];
        var val=datasets[bi].data[i];
        if(!bar||!val||val===0) return;
        var txt=fmtK(val);
        // pill background
        var pw=ctx.measureText(txt).width+10;
        var ph=16;
        var bx=bar.x-pw/2;
        var by=bar.y-ph-5;
        ctx.fillStyle='rgba(255,255,255,0.88)';
        ctx.beginPath();
        ctx.roundRect(bx,by,pw,ph,4);
        ctx.fill();
        ctx.font='600 10px DM Sans, sans-serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        var colors=[C_SEC,C_PROBA,C_MAX];
        ctx.fillStyle=colors[bi];
        ctx.fillText(txt,bar.x,by+ph/2);
      });
    }
    ctx.restore();
  }
};

  for(var i=0;i<12;i++){rp+=fm.probaM[i];rs+=secM[i];cumProba.push(rp);cumSec.push(rs);}
  window._cumData={cumProba:cumProba,cumSec:cumSec};
}

function positionCumStrip(){
  var chart=mainChartInstance;
  var strip=document.getElementById('cum-strip');
  if(!chart||!strip) return;
  var cd=window._cumData;
  if(!cd) return;
  var leftPx=chart.chartArea.left;
  var rightPx=chart.chartArea.right;
  var usableW=rightPx-leftPx;
  // pill half-width estimate for line gap
  var GAP=26;

  function buildRow(label,color,values,top){
    // label div
    var lbl=document.createElement('div');
    lbl.style.cssText='position:absolute;right:'+(strip.offsetWidth-leftPx+8)+'px;top:'+top+'px;text-align:right;max-width:'+(leftPx-8)+'px;line-height:1.3;pointer-events:none';
    lbl.innerHTML='<span style="font-size:9.5px;font-weight:700;color:'+color+'">'+label+'</span>';
    strip.appendChild(lbl);

    // draw line segments between pills
    for(var si=0;si<=12;si++){
      var xA=si===0?leftPx:chart.scales.x.getPixelForValue(si-1)+GAP;
      var xB=si===12?rightPx:chart.scales.x.getPixelForValue(si)-GAP;
      if(xB<=xA) continue;
      var seg=document.createElement('div');
      seg.style.cssText='position:absolute;top:'+(top+9)+'px;height:1px;background:rgba(28,43,51,.09);z-index:0;pointer-events:none';
      seg.style.left=xA+'px'; seg.style.width=(xB-xA)+'px';
      strip.appendChild(seg);
    }

    // pills
    values.forEach(function(v,i){
      var xPx=chart.scales.x.getPixelForValue(i);
      var pill=document.createElement('div');
      pill.style.cssText='position:absolute;transform:translateX(-50%);top:'+top+'px;z-index:1;pointer-events:none';
      pill.style.left=xPx+'px';
      pill.innerHTML=v>0
        ?'<span style="display:inline-flex;background:'+color+'14;border:1px solid '+color+'55;border-radius:20px;padding:2px 7px;font-size:9.5px;font-weight:700;color:'+color+'">'+fmtK(v)+'</span>'
        :'<span style="display:inline-flex;border:1px solid rgba(28,43,51,.07);border-radius:20px;padding:2px 7px;font-size:9px;color:rgba(28,43,51,.2)">-</span>';
      strip.appendChild(pill);
    });
  }

  strip.innerHTML='';
  buildRow('Probabilisé<br>mensuel cumulé','#2DBEC9',cd.cumProba,0);
  buildRow('Sécurisé<br>mensuel cumulé','#00C9A0',cd.cumSec,26);
}

// Hook custom tooltip into Chart.js via plugin
Chart.register({
  id:'customTooltip',
  afterEvent:function(chart,args){
    var evt=args.event;
    var tt=getOrCreateTooltip();
    if(evt.type==='mousemove'){
      var pts=chart.getElementsAtEventForMode(evt.native,'nearest',{intersect:true},true);
      if(pts.length){
        var mi=pts[0].index;
        var dsIdx=pts[0].datasetIndex;
        var ds=chart.data.datasets[dsIdx];
        var html=buildTooltipHTML(mi,ds.label);
        if(!html){tt.style.opacity='0';return;}
        tt.innerHTML=html;
        var rect=chart.canvas.getBoundingClientRect();
        // position top-right of chart
        // Position tooltip near the hovered bar
        var barX=evt.native.clientX;
        var barY=evt.native.clientY;
        var ttW=300;
        var ttH=200;
        var vw=window.innerWidth;
        var vh=window.innerHeight;
        var tx=barX+16;
        var ty=barY-80;
        if(tx+ttW>vw-10) tx=barX-ttW-16;
        if(ty+ttH>vh-10) ty=vh-ttH-10;
        if(ty<8) ty=8;
        tt.style.left=tx+'px';
        tt.style.top=ty+'px';
        tt.style.opacity='1';
      } else {
        tt.style.opacity='0';
      }
    } else if(evt.type==='mouseout'){
      tt.style.opacity='0';
    }
  }
});

}

    if(!activeRef) return items;

  }
  var maxItems=getFilteredItems(D.maxByMonth);

  var secItems=getFilteredItems(D.secByMonth);

  function row2(l1,v1,l2,v2){
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">'
      +'<div><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px">'+l1+'</div><div style="font-size:12px;font-weight:500;color:var(--deep)">'+v1+'</div></div>'
      +'<div><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px">'+l2+'</div><div style="font-size:12px;font-weight:500;color:var(--deep)">'+v2+'</div></div>'
      +'</div>';
  }
  h+='<div style="background:#F7F9FB;border-radius:10px;padding:12px;margin-bottom:14px">'
    +row2('LM signée',m.lm_signee,'Engagement',m.typologie)
    +row2('Complexité',m.complexite,'Type',m.type_mandat)
    +'</div>';

  // ── Probabilité retenue ──
  h+='<div style="margin-bottom:14px">'
    +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px">Probabilité retenue</div>'
    +'<div style="background:#F7F9FB;border-radius:10px;padding:12px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--muted)">Stade ('+m.stade+')</span><span style="font-size:11px;font-weight:600;color:var(--deep)">'+Math.round(stageProba*100)+'%</span></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--muted)">Coef. complexité</span><span style="font-size:11px;font-weight:600;color:var(--deep)">×'+m.coef_complexite.toFixed(2)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--muted)">Coef. contractuel</span><span style="font-size:11px;font-weight:600;color:var(--deep)">×'+m.coef_contractuel.toFixed(2)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px;border-top:2px solid var(--deep)"><span style="font-size:12px;font-weight:700;color:var(--deep)">Probabilité retenue</span><span style="font-size:15px;font-weight:700;color:var(--deep)">'+Math.round(m.proba_brute*100)+'%</span></div>'
    +'</div></div>';

  // ── Revenus ──
  h+='<div style="margin-bottom:14px">'
    +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px">Revenus</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">'
    +'<div style="background:rgba(0,201,160,.08);border:1px solid rgba(0,201,160,.2);border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#00C9A0;margin-bottom:4px">Sécurisé</div><div style="font-size:14px;font-weight:700;color:#00C9A0">'+fmtK(m.rev_sec)+'</div></div>'
    +'<div style="background:rgba(45,190,201,.08);border:1px solid rgba(45,190,201,.2);border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#2DBEC9;margin-bottom:4px">Probabilisé</div><div style="font-size:14px;font-weight:700;color:#2DBEC9">'+fmtK(m.rev_proba)+'</div></div>'
    +'<div style="background:rgba(0,133,202,.08);border:1px solid rgba(0,133,202,.2);border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#0085CA;margin-bottom:4px">Max</div><div style="font-size:14px;font-weight:700;color:#0085CA">'+fmtK(m.rev_max)+'</div></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +'<div style="background:#F7F9FB;border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">Success fee</div><div style="font-size:13px;font-weight:700;color:var(--deep)">'+fmtK(m.success)+'</div></div>'
    +'<div style="background:#F7F9FB;border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">Retainer</div><div style="font-size:13px;font-weight:700;color:var(--deep)">'+fmtK(m.retainer)+'</div></div>'
    +'</div></div>';

  // ── Dates ──
  h+='<div>'
    +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px">Dates</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +'<div style="background:#F7F9FB;border-radius:8px;padding:8px 10px"><div style="font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px">Retainer estimé</div><div style="font-size:12px;font-weight:600;color:var(--deep)">'+m.ret_date_str+'</div></div>'
    +'<div style="background:#F7F9FB;border-radius:8px;padding:8px 10px"><div style="font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px">Closing estimé</div><div style="font-size:12px;font-weight:600;color:var(--deep)">'+m.clos_date_str+'</div></div>'
    +'</div></div>';

  document.getElementById('mo-company-body').innerHTML=h;
  document.getElementById('mo-company').classList.add('open');
}


// Pipeline tracker
function renderPipeline(){
  var stageMap={};
  STAGES_ORDER.forEach(function(s){stageMap[s.k]=[]});

  MANDATS.forEach(function(m){
    var stadeKey=m.stade;
    // Match partial stade names
    var matched=null;
    STAGES_ORDER.forEach(function(s){
      if(stadeKey&&(stadeKey===s.k||stadeKey.indexOf(s.k)===0||s.k.indexOf(stadeKey)===0)){
        if(!matched)matched=s.k;
      }
    });
    if(!matched){
      // Try partial
      STAGES_ORDER.forEach(function(s){
        if(stadeKey&&(s.k.indexOf('Préparation')>=0&&stadeKey.indexOf('Préparation')>=0)){matched='Préparation (IM, BP)'}
        if(stadeKey&&(s.k.indexOf('Exclusivité')>=0&&stadeKey.indexOf('Exclusivité')>=0)){matched='Exclusivité / Due Diligence'}
      });
    }
    if(matched&&stageMap[matched]!==undefined){
      stageMap[matched].push(m);
    }
  });

  // Sort alphabetically within each stage
  Object.keys(stageMap).forEach(function(k){
    stageMap[k].sort(function(a,b){return a.name.localeCompare(b.name,'fr')});
  });

  var colCount=STAGES_ORDER.length;
  document.getElementById('stages-grid').style.gridTemplateColumns='repeat('+colCount+',minmax(0,1fr))';

  var h='';
  STAGES_ORDER.forEach(function(s){
    var list=stageMap[s.k]||[];
    h+='<div class="stage-col"><div class="stage-hdr" style="background:'+s.color+'"><div class="stage-hdr-top"><div class="stage-hdr-name">'+s.k+'</div><div class="stage-count-badge">'+list.length+'</div></div><div class="stage-bar"></div></div><div class="stage-body">';
    if(!list.length){
      h+='<div class="stage-empty">-</div>';
    } else {
      list.forEach(function(m){
        var ref=REFERENTS[m.referent]||{color:'#8A9FAB'};
        var probaStr=Math.round(m.proba_brute*100)+'%';
        h+='<div class="logo-chip" data-mandat="'+m.name.replace(/"/g,'&quot;')+'">'
          +'<div class="chip-logo">'+logoHTML(m.domain,m.name,22)+'</div>'
          +'<div class="chip-name">'+m.name+'</div>'
          +'<span class="chip-ref-dot" style="background:'+ref.color+'" title="'+m.referent+'"></span>'
          +'<span class="chip-proba">'+probaStr+'</span>'
          +'</div>';
      });
    }
    h+='</div></div>';
  });

  document.getElementById('stages-grid').innerHTML=h;

  // Click handlers
  document.getElementById('stages-grid').addEventListener('click',function(e){
    var chip=e.target.closest('.logo-chip');
    if(!chip)return;
    var name=chip.getAttribute('data-mandat');
    if(name)showCompanyModal(name);
  });
}

// Init
renderKPIs();
renderChart();
renderReferentLegend();
renderPipeline();
</script>
