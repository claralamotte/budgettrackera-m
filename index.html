<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate Finance Paris - Suivi des mandats 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#EEF2F5;color:#1A2E38;font-size:14px;min-height:100vh}
:root{--deep:#1C2B33;--border:rgba(28,43,51,.08);--muted:#8A9FAB;--glass:rgba(255,255,255,.62);--glass-border:rgba(255,255,255,.75);--pad:28px;--gap:12px;--radius:14px}

/* ── HEADER ── */
header{background:var(--deep);height:56px;padding:0 var(--pad);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(28,43,51,.18);gap:16px}
.logo-text h1{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-sub{font-size:11px;font-weight:400;color:rgba(255,255,255,.45);margin-top:2px}

/* ── LAYOUT ── */
.main{padding:var(--pad) var(--pad) 56px;max-width:1600px;margin:0 auto}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:var(--gap);margin-bottom:var(--gap)}
.kpi{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px}
.kpi-value{font-size:26px;font-weight:700;line-height:1}
.kpi-label{font-size:11px;color:#8A9FAB;line-height:1.4;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.kpi-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px}
.badge-g{background:#E8F8F0;color:#0B7A52}
.badge-r{background:#FEF2F2;color:#B91C1C}

/* ── CARDS ── */
.card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:20px;margin-bottom:var(--gap)}
.chart-card{background:#fff;border:1px solid rgba(28,43,51,.1);border-radius:var(--radius);padding:20px;margin-bottom:var(--gap)}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--deep);white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}

/* ── CHART ── */
.chart-outer{position:relative;width:100%;height:260px}

/* ── PIPELINE ── */
.pipeline-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--radius);background:rgba(255,255,255,.5);backdrop-filter:blur(16px)}
.stages-grid{display:grid;gap:0;align-items:stretch;min-width:700px}
.stage-col{display:flex;flex-direction:column;border-right:1px solid rgba(28,43,51,.1)}
.stage-col:last-child{border-right:none}
.stage-hdr{padding:9px 8px;display:flex;flex-direction:column;gap:4px;border-bottom:1px solid rgba(255,255,255,.15)}
.stage-hdr-top{display:flex;align-items:center;justify-content:space-between;width:100%;gap:4px}
.stage-hdr-name{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#fff;line-height:1.3;flex:1}
.stage-count-badge{font-size:10px;font-weight:600;color:rgba(255,255,255,.85);background:rgba(255,255,255,.18);padding:1px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.stage-bar{height:1.5px;border-radius:1px;width:100%;background:rgba(255,255,255,.2)}
.stage-body{padding:8px 6px;display:flex;flex-direction:column;gap:5px;flex:1;background:rgba(255,255,255,.45)}
.logo-chip{display:flex;align-items:center;gap:6px;padding:5px 7px;background:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.9);border-radius:7px;cursor:pointer;transition:all .16s}
.logo-chip:hover{background:#fff;border-color:rgba(28,43,51,.15);transform:translateY(-1px);box-shadow:0 4px 12px rgba(28,43,51,.1)}
.chip-logo{width:22px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.chip-logo img{max-width:100%;max-height:100%;object-fit:contain}
.chip-logo .init{font-size:7px;font-weight:700;color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.chip-name{font-size:10px;font-weight:500;color:var(--deep);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-proba{font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0;background:rgba(28,43,51,.06);padding:1px 5px;border-radius:10px}

/* ── MODALES ── */
.mo{position:fixed;inset:0;background:rgba(28,43,51,.42);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:#fff;border-radius:18px;width:100%;padding:24px;position:relative;box-shadow:0 24px 60px rgba(28,43,51,.14);transform:scale(.97) translateY(6px);transition:transform .22s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
.mo.open .md{transform:scale(1) translateY(0)}
.md-x{position:absolute;top:14px;right:14px;background:#F7F9FB;border:1px solid var(--border);color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2;flex-shrink:0}
.month-modal .md{max-width:480px}
.company-modal .md{max-width:460px}
.mo-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(28,43,51,.04);cursor:pointer}
.mo-item:last-child{border-bottom:none}
.mo-item:hover{opacity:.8}
.mo-item-logo{width:32px;height:22px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.mo-item-logo img{max-width:100%;max-height:100%;object-fit:contain}
.mo-item-logo .init{font-size:9px;font-weight:700;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cm-logo{width:48px;height:48px;background:#EEF2F5;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.cm-logo img{max-width:40px;max-height:32px;object-fit:contain}
.cm-logo .init{font-size:15px;font-weight:700}

/* ── REFERENT LEGEND ── */
#referent-legend{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin-bottom:14px}

/* ── LEGEND TOGGLE ROW ── */
.legend-row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;margin-bottom:18px}

/* ── TABLET ── */
@media(max-width:900px){
  :root{--pad:18px;--gap:10px}
  .kpi-row{grid-template-columns:repeat(3,minmax(0,1fr))}
  .chart-outer{height:220px}
  header{height:52px}
}

/* ── MOBILE ── */
@media(max-width:600px){
  :root{--pad:14px;--gap:8px}
  header{height:auto;padding:10px var(--pad);flex-wrap:wrap;gap:8px;position:relative}
  .logo-text h1{font-size:13px}
  .logo-sub{font-size:10px}
  .header-date{align-items:flex-start!important}
  .kpi-row{grid-template-columns:repeat(2,minmax(0,1fr))}
  .kpi-value{font-size:22px}
  .chart-outer{height:190px}
  .md{padding:16px;border-radius:14px}
  .month-modal .md,.company-modal .md{max-width:100%}
  .mo{padding:10px;align-items:flex-end}
  .mo .md{border-radius:18px 18px 0 0;max-height:85vh}
}
</style>

function toggleDs(idx){
  if(!mainChartInstance)return;
  if(activeDs.size===3){
    // Tout visible : on isole celui cliqué
    activeDs=new Set([idx]);
  } else if(activeDs.has(idx)&&activeDs.size===1){
    // Seul actif recliqué : tout réafficher
    activeDs=new Set([0,1,2]);

    titleEl.textContent=title;

    var rowEl=document.createElement('div');
    rowEl.style.cssText='position:relative;height:22px;margin-bottom:10px';
    strip.appendChild(rowEl);
    for(var si=0;si<=12;si++){

      var xB=si===12?caRight:(chart.scales.x.getPixelForValue(si)-GAP);
      if(xB>xA){
        var seg=document.createElement('div');
        seg.style.cssText='position:absolute;height:1px;background:rgba(28,43,51,.15);top:10px;pointer-events:none';
        seg.style.left=xA+'px';seg.style.width=(xB-xA)+'px';

      pill.style.left=xPx+'px';

        :'<span style="display:inline-flex;justify-content:center;min-width:44px;border:1px solid rgba(28,43,51,.1);border-radius:20px;padding:1px 7px;font-size:9.5px;color:rgba(28,43,51,.2)">-</span>';
      rowEl.appendChild(pill);
    });
  }
  if(activeDs.has(0))buildSection('Revenu sécurisé cumulé',C_SEC,cd.cs);
  if(activeDs.has(1))buildSection('Revenu probabilisé cumulé',C_PROBA,cd.cp);
  if(activeDs.has(2))buildSection('Revenu max cumulé',C_MAX,cd.cm);

var topLabelPlugin={id:'topLabel',afterDatasetsDraw:function(chart){
  var ctx=chart.ctx,ds=chart.data.datasets;
  var metas=[chart.getDatasetMeta(0),chart.getDatasetMeta(1),chart.getDatasetMeta(2)];
  if(!metas[0].data.length)return;ctx.save();
  for(var i=0;i<12;i++){metas.forEach(function(meta,bi){
    if(ds[bi].hidden)return;
    var bar=meta.data[i],val=ds[bi].data[i];
    if(!bar||!val||val===0)return;
    var txt=fmtK(val),pw=ctx.measureText(txt).width+14,ph=17,bx=bar.x-pw/2,by=bar.y-ph-4;
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.beginPath();ctx.roundRect(bx,by,pw,ph,ph/2);ctx.fill();
    ctx.font='600 10px DM Sans, sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=[C_SEC,C_PROBA,C_MAX][bi];ctx.fillText(txt,bar.x,by+ph/2);
  });}ctx.restore();
}};

  var sc=scMap[dsLabel];if(!sc)return'';

    +'</div>';

  if(refs.length>1){
    h+='<div style="padding:10px 18px 4px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid rgba(28,43,51,.05)">';
    refs.forEach(function(rl){

    h+='</div>';

  h+='<div style="padding:10px 18px 4px">';
  refs.forEach(function(rl){
    var rc=REFERENTS[rl.ref]||{color:'#8A9FAB'};
    var ini=rl.ref.split(' ').map(function(w){return w[0]}).join('').substring(0,3);
    var items=(D[sc.bk]&&D[sc.bk][mi]||[]).filter(function(it){return it.referent===rl.ref&&it.amount>0});
    var dn=REAL_REFERENTS[rl.ref]||rl.ref;

      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:'+(items.length?'7':'0')+'px">'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<div style="width:26px;height:26px;border-radius:50%;background:'+rc.color+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff">'+ini+'</div>'
      +'<span style="font-size:13px;font-weight:600;color:#1C2B33">'+dn+'</span>'

      +'</div>';
    items.forEach(function(it){
      var fBg=it.revtype==='Retainer'?'#EFF6FF':'#F0FDF4';
      var fCol=it.revtype==='Retainer'?'#1D4ED8':'#15803D';
      var fBd=it.revtype==='Retainer'?'#BFDBFE':'#BBF7D0';
      var feeTag='<span style="display:inline-block;width:76px;text-align:center;font-size:10px;font-weight:600;padding:2px 0;border-radius:10px;background:'+fBg+';color:'+fCol+';border:1px solid '+fBd+';white-space:nowrap;flex-shrink:0">'+it.revtype+'</span>';

Chart.register({id:'customTT',afterEvent:function(chart,args){
  var evt=args.event,tt=getTT();
  if(evt.type==='mousemove'){
    var pts=chart.getElementsAtEventForMode(evt.native,'nearest',{intersect:true},true);
    if(pts.length){
      var mi=pts[0].index,ds=chart.data.datasets[pts[0].datasetIndex];
      var html=buildTT(mi,ds.label);if(!html){tt.style.opacity='0';return;}
      tt.innerHTML=html;
      var x=evt.native.clientX+20,y=evt.native.clientY-100;
      if(x+390>window.innerWidth)x=evt.native.clientX-400;if(y<8)y=8;
      tt.style.left=x+'px';tt.style.top=y+'px';tt.style.opacity='1';
    }else tt.style.opacity='0';
  }else if(evt.type==='mouseout')tt.style.opacity='0';
}});

var GLOBAL_Y_MAX=(function(){

  return Math.max.apply(null,allMax)*1.35;
})();

    pill.style.background=isSel?r.color:r.color+'14';

    pill.style.border='1px solid '+r.color;
    var ck=pill.querySelector('.pill-check'),tk=pill.querySelector('.pill-tick');
    if(ck){
      ck.style.background=isSel?'rgba(255,255,255,.22)':'transparent';

    if(tk)tk.style.opacity=isSel?'1':'0';

  var lbl=document.getElementById('chart-mode-label');

    });
    var pMax=Math.round(selMax/totalMax*100);

      +'<span style="color:rgba(28,43,51,.2);font-size:10px">·</span>'

      +'<span style="color:rgba(28,43,51,.2);font-size:10px">·</span>'

  STEPS.forEach(function(st,i){var isA=(i===ci),isP=(i<ci),op=isP||isA?'1':'0.2';h+='<div style="flex:1" title="'+st.k+'"><div style="height:5px;border-radius:2px;background:'+st.c+';opacity:'+op+'"></div><div style="font-size:7.5px;text-align:center;margin-top:3px;font-weight:'+(isA?'700':'400')+';color:'+(isA?st.c:isP?st.c:'#8A9FAB')+';opacity:'+(isA?'1':isP?'0.7':'0.5')+'">'+st.s+'</div></div>';});
  h+='</div></div>';
  function r2(l1,v1,l2,v2){return'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px"><div><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB;margin-bottom:2px">'+l1+'</div><div style="font-size:12px;font-weight:500;color:var(--deep)">'+v1+'</div></div><div><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB;margin-bottom:2px">'+l2+'</div><div style="font-size:12px;font-weight:500;color:var(--deep)">'+v2+'</div></div></div>';}
  h+='<div style="background:#F7F9FB;border-radius:10px;padding:12px;margin-bottom:14px">'+r2('LM signée',m.lm_signee,'Engagement',m.typologie)+r2('Complexité',m.complexite,'Type',m.type_mandat)+'</div>';
  h+='<div style="margin-bottom:14px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#8A9FAB;margin-bottom:8px">Probabilité retenue</div><div style="background:#F7F9FB;border-radius:10px;padding:12px"><div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:#8A9FAB">Stade ('+m.stade+')</span><span style="font-size:11px;font-weight:600;color:var(--deep)">'+Math.round(sp*100)+'%</span></div><div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:#8A9FAB">Coef. complexité</span><span style="font-size:11px;font-weight:600;color:var(--deep)">x'+m.coef_complexite.toFixed(2)+'</span></div><div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:#8A9FAB">Coef. contractuel</span><span style="font-size:11px;font-weight:600;color:var(--deep)">x'+m.coef_contractuel.toFixed(2)+'</span></div><div style="display:flex;justify-content:space-between;padding-top:8px;margin-top:4px;border-top:2px solid var(--deep)"><span style="font-size:12px;font-weight:700;color:var(--deep)">Probabilité retenue</span><span style="font-size:15px;font-weight:700;color:var(--deep)">'+Math.round(m.proba_brute*100)+'%</span></div></div></div>';
  h+='<div style="margin-bottom:14px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#8A9FAB;margin-bottom:8px">Revenus</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px"><div style="background:rgba(0,201,160,.08);border:1px solid rgba(0,201,160,.2);border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#00C9A0;margin-bottom:4px">Sécurisé</div><div style="font-size:14px;font-weight:700;color:#00C9A0">'+fmtK(m.rev_sec)+'</div></div><div style="background:rgba(45,190,201,.08);border:1px solid rgba(45,190,201,.2);border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#2DBEC9;margin-bottom:4px">Probabilisé</div><div style="font-size:14px;font-weight:700;color:#2DBEC9">'+fmtK(m.rev_proba)+'</div></div><div style="background:rgba(0,133,202,.08);border:1px solid rgba(0,133,202,.2);border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#0085CA;margin-bottom:4px">Max</div><div style="font-size:14px;font-weight:700;color:#0085CA">'+fmtK(m.rev_max)+'</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:#F7F9FB;border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB;margin-bottom:4px">Success fee</div><div style="font-size:13px;font-weight:700;color:var(--deep)">'+fmtK(m.success)+'</div></div><div style="background:#F7F9FB;border-radius:8px;padding:9px 11px"><div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB;margin-bottom:4px">Retainer</div><div style="font-size:13px;font-weight:700;color:var(--deep)">'+fmtK(m.retainer)+'</div></div></div></div>';
  h+='<div><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#8A9FAB;margin-bottom:8px">Dates</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:#F7F9FB;border-radius:8px;padding:8px 10px"><div style="font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB;margin-bottom:3px">Retainer estimé</div><div style="font-size:12px;font-weight:600;color:var(--deep)">'+m.ret_date_str+'</div></div><div style="background:#F7F9FB;border-radius:8px;padding:8px 10px"><div style="font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB;margin-bottom:3px">Closing estimé</div><div style="font-size:12px;font-weight:600;color:var(--deep)">'+m.clos_date_str+'</div></div></div></div>';
  document.getElementById('mo-company-body').innerHTML=h;document.getElementById('mo-company').classList.add('open');
}

function renderPipeline(){
  var sm={};STAGES_ORDER.forEach(function(s){sm[s.k]=[];});
  MANDATS.forEach(function(m){
    var matched=null;STAGES_ORDER.forEach(function(s){if(m.stade&&!matched&&(m.stade===s.k||m.stade.indexOf(s.k.split('/')[0].trim())>=0||s.k.indexOf(m.stade.split('(')[0].trim())>=0))matched=s.k;});
    if(!matched)STAGES_ORDER.forEach(function(s){if(m.stade&&s.k.indexOf('Préparation')>=0&&m.stade.indexOf('Préparation')>=0)matched='Préparation (IM, BP)';if(m.stade&&s.k.indexOf('Exclusivité')>=0&&m.stade.indexOf('Exclusivité')>=0)matched='Exclusivité / Due Diligence';});
    if(matched&&sm[matched]!==undefined)sm[matched].push(m);
  });
  Object.keys(sm).forEach(function(k){sm[k].sort(function(a,b){return a.name.localeCompare(b.name,'fr');});});
  document.getElementById('stages-grid').style.gridTemplateColumns='repeat('+STAGES_ORDER.length+',minmax(0,1fr))';
  var h='';
  STAGES_ORDER.forEach(function(s){
    var list=sm[s.k]||[];
    h+='<div class="stage-col"><div class="stage-hdr" style="background:'+s.color+'"><div class="stage-hdr-top"><div class="stage-hdr-name">'+s.k+'</div><div class="stage-count-badge">'+list.length+'</div></div><div class="stage-bar"></div></div><div class="stage-body">';
    if(!list.length)h+='<div style="font-size:10px;color:#8A9FAB;text-align:center;padding:12px 4px;opacity:.4;font-style:italic">-</div>';
    else list.forEach(function(m){
      var ref=REFERENTS[m.referent]||{color:'#8A9FAB'};
      h+='<div class="logo-chip" data-mandat="'+m.name.replace(/"/g,'&quot;')+'"><div class="chip-logo">'+logoHTML(m.domain,m.name,22)+'</div><div class="chip-name">'+m.name+'</div><span style="width:5px;height:5px;border-radius:50%;background:'+ref.color+';flex-shrink:0"></span><span class="chip-proba">'+Math.round(m.proba_brute*100)+'%</span></div>';
    });
    h+='</div></div>';
  });
  document.getElementById('stages-grid').innerHTML=h;
  document.getElementById('stages-grid').addEventListener('click',function(e){var chip=e.target.closest('.logo-chip');if(chip)showCompanyModal(chip.getAttribute('data-mandat'));});
}

function renderReferentLegend(){
  var el=document.getElementById('referent-legend');
  el.innerHTML='';
  var lbl=document.createElement('span');
  lbl.style.cssText='font-size:12px;font-weight:500;color:#8A9FAB;align-self:center;white-space:nowrap';
  lbl.textContent='Filtrer par référent :';
  el.appendChild(lbl);
  Object.keys(REFERENTS).forEach(function(name){
    var r=REFERENTS[name];
    var dn=REAL_REFERENTS[name]||name;
    var pill=document.createElement('div');
    pill.className='ref-pill';
    pill.setAttribute('data-ref',name);
    pill.style.cssText='display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px 3px 5px;border-radius:20px;cursor:pointer;user-select:none;border:1px solid '+r.color+';color:'+r.color+';background:'+r.color+'14;transition:all .18s';
    // Checkbox carré arrondi
    var ck=document.createElement('span');
    ck.className='pill-check';
    ck.style.cssText='width:13px;height:13px;border-radius:3px;border:1.5px solid '+r.color+';display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;background:transparent';
    // Tick SVG
    var tk=document.createElement('span');
    tk.className='pill-tick';
    tk.style.cssText='opacity:0;transition:opacity .15s;line-height:1;font-size:10px;font-weight:700;color:#fff';
    tk.innerHTML='&#10003;';
    ck.appendChild(tk);
    pill.appendChild(ck);
    var txt=document.createElement('span');
    txt.textContent=dn;
    pill.appendChild(txt);
    (function(n){
      pill.onclick=function(){
        if(activeRefs.has(n))activeRefs.delete(n);else activeRefs.add(n);
        updateChart();
      };
    })(name);
    el.appendChild(pill);
  });
}

renderKPIs();renderChart();renderReferentLegend();renderPipeline();

// Sélecteur de plage de mois — dropdown compact
(function(){
  var fromDisp=document.getElementById('sel-from-display');
  var toDisp=document.getElementById('sel-to-display');
  var dropdown=document.getElementById('date-dropdown');
  var dropBody=document.getElementById('date-dropdown-body');
  if(!fromDisp||!toDisp||!dropdown)return;

  var activeField=null; // 'from' | 'to'

  function labelFor(i){return ALL_SHORT[i];}

  function updateDisplays(){
    fromDisp.textContent=labelFor(monthRange.from);
    toDisp.textContent=labelFor(monthRange.to);
  }

  function renderDropdown(){
    dropBody.innerHTML='';
    var title=document.createElement('div');
    title.style.cssText='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#8A9FAB;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(28,43,51,.06)';
    title.textContent=activeField==='from'?'Choisir le début':'Choisir la fin';
    dropBody.appendChild(title);

    // Grouper par année
    var yearGroups={};
    ALL_LABELS.forEach(function(lbl,i){
      var y=lbl.split(' ')[1];
      if(!yearGroups[y])yearGroups[y]=[];
      yearGroups[y].push(i);
    });

    Object.keys(yearGroups).forEach(function(yr){
      var yrLabel=document.createElement('div');
      yrLabel.style.cssText='font-size:10px;font-weight:700;color:#1C2B33;margin:8px 0 5px;letter-spacing:.04em';
      yrLabel.textContent=yr;
      dropBody.appendChild(yrLabel);

      var row=document.createElement('div');
      row.style.cssText='display:flex;flex-wrap:wrap;gap:4px';

      yearGroups[yr].forEach(function(i){
        var isSelected=(activeField==='from'?i===monthRange.from:i===monthRange.to);
        var isInRange=(i>=monthRange.from&&i<=monthRange.to);
        var short=ALL_SHORT[i].split(' ')[0];

        var pill=document.createElement('button');
        pill.textContent=short;
        pill.style.cssText=[
          'font-family:inherit',
          'font-size:11px',
          'font-weight:'+(isSelected?'700':'500'),
          'padding:4px 10px',
          'border-radius:20px',
          'cursor:pointer',
          'outline:none',
          'transition:all .12s',
          'border:1px solid '+(isSelected?'#0085CA':isInRange?'#0085CA30':'rgba(28,43,51,.1)'),
          'background:'+(isSelected?'#0085CA':isInRange?'#0085CA0a':'transparent'),
          'color:'+(isSelected?'#fff':isInRange?'#0085CA':'#6B7B86')
        ].join(';');

        pill.addEventListener('click',function(e){
          e.stopPropagation();
          if(activeField==='from'){
            monthRange.from=i;
            if(monthRange.to<monthRange.from)monthRange.to=monthRange.from;
          } else {
            monthRange.to=i;
            if(monthRange.from>monthRange.to)monthRange.from=monthRange.to;
          }
          updateDisplays();
          closeDropdown();
          updateChart();
        });
        row.appendChild(pill);
      });
      dropBody.appendChild(row);
    });
  }

  function openDropdown(field){
    activeField=field;
    renderDropdown();
    dropdown.style.display='block';
    // Highlight active field
    fromDisp.style.color=field==='from'?'#0085CA':'#1C2B33';
    toDisp.style.color=field==='to'?'#0085CA':'#1C2B33';
  }

  function closeDropdown(){
    dropdown.style.display='none';
    activeField=null;
    fromDisp.style.color='#1C2B33';
    toDisp.style.color='#1C2B33';
  }

  fromDisp.addEventListener('click',function(e){e.stopPropagation();activeField==='from'?closeDropdown():openDropdown('from');});
  toDisp.addEventListener('click',function(e){e.stopPropagation();activeField==='to'?closeDropdown():openDropdown('to');});
  document.addEventListener('click',function(){closeDropdown();});
  dropdown.addEventListener('click',function(e){e.stopPropagation();});

  updateDisplays();
})();

</script>
