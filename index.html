<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#EEF2F5;color:#1A2E38;font-size:14px;min-height:100vh}
:root{--deep:#1C2B33;--border:rgba(28,43,51,.08);--muted:#8A9FAB;--glass:rgba(255,255,255,.62);--glass-border:rgba(255,255,255,.75);--pad:28px;--gap:12px;--radius:14px}
header{background:var(--deep);height:56px;padding:0 var(--pad);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(28,43,51,.18);gap:16px}
.logo-text h1{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-sub{font-size:11px;font-weight:400;color:rgba(255,255,255,.45);margin-top:2px}
.main{padding:var(--pad) var(--pad) 56px;max-width:1600px;margin:0 auto}
.kpi-row{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:var(--gap);margin-bottom:var(--gap)}
.kpi{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;transition:transform .15s,box-shadow .15s}
.kpi.kpi-clickable{cursor:pointer}.kpi.kpi-clickable:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(28,43,51,.12)}
.kpi-value{font-size:26px;font-weight:700;line-height:1}
.kpi-label{font-size:11px;color:#8A9FAB;line-height:1.4;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.kpi-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px}
.kpi-badge.kpi-badge-clickable{cursor:pointer;transition:all .15s}.kpi-badge.kpi-badge-clickable:hover{opacity:1;transform:translateY(-1px);box-shadow:0 3px 10px rgba(28,43,51,.15)}
.badge-g{background:#E8F8F0;color:#0B7A52}.badge-r{background:#FEF2F2;color:#B91C1C}
.risk-row{border-radius:6px;padding:3px 5px;margin-left:-5px;margin-right:-5px;transition:background .14s,transform .14s,box-shadow .14s;cursor:pointer}.risk-row:hover{background:rgba(28,43,51,.03)}
.card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:20px;margin-bottom:var(--gap)}
.chart-card{background:#fff;border:1px solid rgba(28,43,51,.1);border-radius:var(--radius);padding:20px;margin-bottom:var(--gap)}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--deep);white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.chart-outer{position:relative;width:100%;height:260px}
.pipeline-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--radius);background:rgba(255,255,255,.5);backdrop-filter:blur(16px)}
.stages-grid{display:grid;gap:0;align-items:stretch;min-width:700px}
.stage-col{display:flex;flex-direction:column;border-right:1px solid rgba(28,43,51,.1)}.stage-col:last-child{border-right:none}
.stage-hdr{padding:9px 8px;display:flex;flex-direction:column;gap:4px;border-bottom:1px solid rgba(255,255,255,.15)}
.stage-hdr-top{display:flex;align-items:center;justify-content:space-between;width:100%;gap:4px}
.stage-hdr-name{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#fff;line-height:1.3;flex:1}
.stage-count-badge{font-size:10px;font-weight:600;color:rgba(255,255,255,.85);background:rgba(255,255,255,.18);padding:1px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.stage-bar{height:1.5px;border-radius:1px;width:100%;background:rgba(255,255,255,.2)}
.stage-body{padding:8px 6px;display:flex;flex-direction:column;gap:5px;flex:1;background:rgba(255,255,255,.45)}
.logo-chip{display:flex;align-items:center;gap:6px;padding:5px 7px;background:rgba(255,255,255,.8);border:none;border-radius:7px;cursor:pointer;transition:background .14s,transform .14s,box-shadow .14s}
.chip-logo{width:22px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.chip-logo img{max-width:100%;max-height:100%;object-fit:contain}
.chip-logo .init{font-size:7px;font-weight:700;color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.chip-name{font-size:10px;font-weight:500;color:var(--deep);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mo{position:fixed;inset:0;background:rgba(28,43,51,.42);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}.mo.open{opacity:1;pointer-events:all}
.md{background:#fff;border-radius:18px;width:100%;padding:24px;position:relative;box-shadow:0 24px 60px rgba(28,43,51,.14);transform:scale(.97) translateY(6px);transition:transform .22s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}.mo.open .md{transform:scale(1) translateY(0)}
.md-x{position:absolute;top:14px;right:14px;background:#F7F9FB;border:1px solid var(--border);color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2;flex-shrink:0}
.month-modal .md{max-width:480px}.company-modal .md{max-width:460px}
.mo-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(28,43,51,.04);cursor:pointer}.mo-item:last-child{border-bottom:none}.mo-item:hover{opacity:.8}
.mo-item-logo{width:32px;height:22px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.mo-item-logo img{max-width:100%;max-height:100%;object-fit:contain}
.mo-item-logo .init{font-size:9px;font-weight:700;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cm-logo{width:48px;height:48px;background:#EEF2F5;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.cm-logo img{max-width:40px;max-height:32px;object-fit:contain}.cm-logo .init{font-size:15px;font-weight:700}
#referent-legend{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin-bottom:14px}
.legend-row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;margin-bottom:18px}
@media(max-width:900px){:root{--pad:18px;--gap:10px}.kpi-row{grid-template-columns:repeat(3,minmax(0,1fr))}.chart-outer{height:220px}header{height:52px}}
@media(max-width:600px){:root{--pad:14px;--gap:8px}header{height:auto;padding:10px var(--pad);flex-wrap:wrap;gap:8px;position:relative}.logo-text h1{font-size:13px}.logo-sub{font-size:10px}.header-date{align-items:flex-start!important}.kpi-row{grid-template-columns:repeat(2,minmax(0,1fr))}.kpi-value{font-size:22px}.chart-outer{height:190px}.md{padding:16px;border-radius:14px}.month-modal .md,.company-modal .md{max-width:100%}.mo{padding:10px;align-items:flex-end}.mo .md{border-radius:18px 18px 0 0;max-height:85vh}}

function renderRisk(){var el=document.getElementById('risk-body');if(!el)return;var actives=MANDATS.filter(function(m){return inRange(m)&&(activeRefs.size===0||activeRefs.has(m.referent));});var tMax=actives.reduce(function(s,m){return s+m.rev_max;},0);var tProba=actives.reduce(function(s,m){return s+m.rev_proba;},0);var tBin=actives.reduce(function(s,m){return s+(m.rev_bin||0);},0);var h='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px">';function scStats(keyFn,total){var sv=actives.map(function(m){return keyFn(m);});var nonZero=actives.filter(function(m){return keyFn(m)>0;});var sortedS=actives.slice().sort(function(a,b){return keyFn(b)-keyFn(a);});var t1=total>0&&sortedS.length?Math.round(keyFn(sortedS[0])/total*100):0;var t3=total>0?Math.round(sortedS.slice(0,3).reduce(function(s,m){return s+keyFn(m);},0)/total*100):0;var svSorted=sv.slice().sort(function(a,b){return a-b;});var nn=svSorted.length;var med=nn===0?0:nn%2===0?(svSorted[nn/2-1]+svSorted[nn/2])/2:svSorted[Math.floor(nn/2)];var mn=total/Math.max(actives.length,1);var std=Math.sqrt(sv.reduce(function(s,v){return s+(v-mn)*(v-mn);},0)/Math.max(actives.length,1));return{count:nonZero.length,t1:t1,t3:t3,med:med,std:std};}function barSection(title,color,keyFn,total){var st=scStats(keyFn,total);var s='<div><div style="background:'+color+'0d;border:1px solid '+color+'25;border-radius:12px;padding:10px 14px;margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:#8A9FAB">'+title+'</div><span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:'+color+'15;color:'+color+';border:1px solid '+color+'35">'+st.count+' mandat'+(st.count>1?'s':'')+'</span></div><div style="display:flex;align-items:flex-end;justify-content:space-between;gap:4px">';function kpi(lbl,val){return'<div style="display:flex;flex-direction:column;gap:2px"><div style="font-size:8px;font-weight:500;color:#8A9FAB;white-space:nowrap">'+lbl+'</div><div style="font-size:13px;font-weight:700;color:'+color+'">'+val+'</div></div>';}s+=kpi('Top 1',st.t1+'%')+kpi('Top 3',st.t3+'%')+kpi('Moyenne',fmtK(Math.round(total/Math.max(actives.length,1))))+kpi('Médiane',fmtK(st.med))+kpi('Écart-type',fmtK(st.std));s+='</div></div>';var sortedByKey=actives.slice().sort(function(a,b){return keyFn(b)-keyFn(a);});sortedByKey.forEach(function(m){var val=keyFn(m);var isZero=val<=0;var pct=(!isZero&&total>0)?Math.round(val/total*100):0;var barPct=(!isZero&&total>0)?val/total*100:0;s+='<div class="risk-row" data-mandat="'+m.name.replace(/"/g,'&quot;')+'" data-color="'+color+'" style="margin-bottom:8px;opacity:'+(isZero?'0.35':'1')+'"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;gap:8px"><div style="display:flex;align-items:center;gap:6px;min-width:0"><div style="width:20px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+logoHTML(m.domain,m.name,18)+'</div><span style="font-size:10px;font-weight:500;color:'+(isZero?'#8A9FAB':'var(--deep)')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+m.name+'</span></div><span style="font-size:10px;font-weight:700;color:'+(isZero?'#8A9FAB':color)+';white-space:nowrap;flex-shrink:0">'+(isZero?'—':pct+'%')+'</span></div><div style="height:4px;background:rgba(28,43,51,.06);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+barPct+'%;background:'+(isZero?'rgba(28,43,51,.12)':color)+';border-radius:4px;transition:width .4s"></div></div></div>';});s+='</div>';return s;}h+=barSection('Revenu max',C_MAX,function(m){return m.rev_max;},tMax)+barSection('Revenu probabilisé',C_PROBA,function(m){return m.rev_proba;},tProba)+barSection('Revenu binaire','#A855F7',function(m){return m.rev_bin||0;},tBin);h+='</div>';el.innerHTML=h;el.querySelectorAll('.risk-row[data-mandat]').forEach(function(row){var col=row.getAttribute('data-color')||'rgba(28,43,51,1)';row.addEventListener('mouseenter',function(){row.style.background=col+'14';row.style.borderRadius='6px';row.style.transform='translateY(-1px)';row.style.boxShadow='0 2px 8px '+col+'25';});row.addEventListener('mouseleave',function(){row.style.background='';row.style.transform='';row.style.boxShadow='';});row.addEventListener('click',function(){showCompanyModal(row.getAttribute('data-mandat'));});});}
renderKPIs();renderChart();renderReferentLegend();renderPipeline();renderRisk();
